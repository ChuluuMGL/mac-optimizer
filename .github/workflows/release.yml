name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release metadata
        run: python3 scripts/check_release_ready.py --tag "$GITHUB_REF_NAME"

      - name: Run test suite
        run: bash tests/run.sh

      - name: Build runtime package
        run: python3 scripts/package_runtime_skill.py

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/mac-optimizer-skill.zip \
            dist/mac-optimizer-skill-${GITHUB_REF_NAME#v}.zip \
            --title "$GITHUB_REF_NAME" \
            --notes "Runtime package for $GITHUB_REF_NAME."
